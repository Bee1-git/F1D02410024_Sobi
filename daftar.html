<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>daftar</title>
    <link rel="stylesheet" href="imas.css" />
  </head>

  <body>
    <main class="page-wrapper">
      <h1 class="textalign">Selamat Datang! Di IDNJTOUR</h1>
      <section class="form-section">
        <form class="form-layout" onsubmit="return pesan();">
          <fieldset>
            <legend>Data Pribadi</legend>

            <label for="nama">Nama Lengkap</label>
            <input class="form" type="text" id="nama" name="nama" />

            <label for="email">Email</label>
            <input type="email" id="email" name="email" />

            <label for="nohp">NO HP</label>
            <input type="tel" id="nohp" name="nohp" />
          </fieldset>

          <fieldset>
            <legend>Informasi Tambahan</legend>

            <label for="hobi">Hobi</label>
            <input class="form" type="text" id="hobi" name="hobi" />

            <label for="daerah">Daerah</label>
            <select id="daerah" name="daerah">
              <option value="">-- Pilih Daerah --</option>
              <option value="lombok">lombok</option>
              <option value="sumbawa">sumbawa</option>
              <option value="dompu">dompu</option>
              <option value="bima">bima</option>
            </select>

            <label for="alamat">Alamat</label>
            <textarea id="alamat" name="alamat" rows="4"></textarea>
          </fieldset>

          <div class="button-group">
            <button type="submit">Daftar</button>
            <button type="reset">Reset</button>
          </div>
        </form>
      </section>
    </main>
    <script src="sobi.js"></script>
  </body>
</html>
